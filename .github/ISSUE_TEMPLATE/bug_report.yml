name: Bug report
description: Report a false positive, false negative, or CLI bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide a minimal fixture with fake tokens only. Do not paste real secrets, private paths, cookies, or full scan reports.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - False positive
        - False negative
        - CLI behavior
        - GitHub Action behavior
        - Documentation
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
